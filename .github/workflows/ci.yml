name: Continuous Integration

on:
  push:
    branches:
      - main
      - develop
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
      - 'refactor/**'

  pull_request:
    branches:
      - main
      - develop

jobs:
  ci:
    name: Lint • Test • Build

    runs-on: ubuntu-latest

    timeout-minutes: 15

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format -- --check

      - name: Run ESLint
        run: npm run lint

      # - name: Run unit tests
      #   run: npm test

      - name: Build application
        run: npm run build
